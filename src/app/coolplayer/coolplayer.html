<section class="coolplayer-container" id="coolplayer-container">
    <!-- radio img  -->
    <div class="radio-image-container">
        <img [src]="radios[selectedRadioIndex]?.img" alt="" class=radio-img>
    </div>
    <div class="radio-info">
        <!-- radio  -->
        <div>
            <h1 class="radio-name" aria-live="polite">{{ radios[selectedRadioIndex]?.name }}</h1>
            <div class="year-game-container">
                <p class="radio-year" aria-live="polite">{{ radios[selectedRadioIndex]?.year }}</p>
                <h4 class="radio-game" aria-live="polite">{{ radios[selectedRadioIndex]?.game }}</h4>
            </div>
            <div class="producer-genre-container">
                <p class="radio-producer" aria-live="polite">{{ radios[selectedRadioIndex]?.producer }}</p>
                <p class="radio-genre" aria-live="polite">{{ radios[selectedRadioIndex]?.genre }}</p>
            </div>
        </div>

        <!-- reproductor audio  -->
        <audio #audioPlayer autoplay (play)="onAudioPlay()" (pause)="onAudioPause()">
            Tu navegador no soporta audio HTML5.
        </audio>
        <!-- controles -->
        <div class="controls" role="group" aria-label="Controles de reproducción">
            <button type="button" class="play-button" (click)="togglePlay()"
                [attr.aria-label]="isPlaying ? 'Pausar audio' : 'Reproducir audio'">
                <img [src]="isPlaying ? '/icons/pause.svg' : '/icons/play.svg'" alt="" aria-hidden="true"
                    class="control-icon" />
                <span class="visually-hidden">{{ isPlaying ? 'Pausa' : 'Reproducir' }}</span>
            </button>

            <label class="volume-control" for="volumeSlider">
                <img [src]="getVolumeIcon()" alt="" aria-hidden="true" class="volume-icon control-icon" />
                <input id="volumeSlider" type="range" min="0" max="1" step="0.01" [(ngModel)]="volume"
                    (input)="onVolumeInput()"
                    [style.background]="'linear-gradient(90deg, #76e070 ' + (volume*100) + '%, rgba(255,255,255,0.12) ' + (volume*100) + '%)'" />
            </label>
        </div>
        <!-- botones radios -->
        <div class="radio-buttons">
            <button *ngFor="let radio of radios; let index = index" type="button" class="radio-button"
                [class.active]="index === selectedRadioIndex" [attr.aria-pressed]="index === selectedRadioIndex"
                [attr.aria-label]="radio.name" (click)="selectRadio(index)">
                <img [src]="radio.backimg" alt="{{ radio.name }}" class="radio-logo" />

            </button>
        </div>
    </div>
</section>
