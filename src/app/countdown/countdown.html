<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Countdown</title>

</head>

<body>
   <section id="countdown">
      <div id="weeks">
         <span>{{ weeks }}</span>
         <span class="peque">Semanas</span>
      </div>
      <div id="days">
         <span>{{ days }}</span>
         <span class="peque">Días</span>
      </div>
      <div id="hours">
         <span>{{ hours }}</span>
         <span class="peque">Horas</span>
      </div>
      <div id="minutes">
         <span>{{ minutes }}</span>
         <span class="peque">Minutos</span>
      </div>
      <div id="seconds">
         <span>{{ seconds }}</span>
         <span class="peque">Segundos</span>
      </div>
   </section>




</body>

</html>
