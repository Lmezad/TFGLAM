<div class="countdown">
  <div>
    <span>{{ weeks }}</span>
    <small>Semanas</small>
  </div>
  <div>
    <span>{{ days }}</span>
    <small>Días</small>
  </div>
  <div>
    <span>{{ hours }}</span>
    <small>Horas</small>
  </div>
  <div>
    <span>{{ minutes }}</span>
    <small>Minutos</small>
  </div>
  <div>
    <span>{{ seconds }}</span>
    <small>Segundos</small>
  </div>
</div>
