<section class="station-roulette" aria-label="Selector de emisora">
  <!-- video -->
  <video autoplay loop muted playsinline preload="auto" crossorigin="anonymous" class="background-video" tabindex="-1">
    <source src="https://5fkef9udgm.ufs.sh/f/gkQPQrvJfr6GuYtoGmamtfCLDHTWN7a2goKn1vZJPIA5GM9e" type="video/mp4" />
    Tu navegador no soporta el elemento de video.
  </video>
  <!-- maincontainer -->
  <div class="roulette-wheel" #wheelContainer>
    <!-- botones radios -->
    <button *ngFor="let radio of radios; let index = index" type="button" class="roulette-option"
      [class.active]="index === selectedRadioIndex" [attr.aria-pressed]="index === selectedRadioIndex"
      [attr.aria-label]="radio.name" [style.transform]="getTransform(index)" (click)="selectRadio(index)">
      <img [src]="radio.img" alt="{{ radio.name }}" class="radiologo" />
      <span class="radio-name">{{ radio.name }}</span>
    </button>
    <!-- texto centro -->
    <div class="roulette-center">
      <strong>{{ selectedRadioName }}</strong>

    </div>
    <!-- reproductor audio  -->
    <audio #audioPlayer autoplay (play)="onAudioPlay()" (pause)="onAudioPause()">
      Tu navegador no soporta audio HTML5.
    </audio>
    <!-- controles -->
    <div class="controls" role="group" aria-label="Controles de reproducción">
      <button type="button" class="play-button" (click)="togglePlay()"
        [attr.aria-label]="isPlaying ? 'Pausar audio' : 'Reproducir audio'">
        <!-- icono dinámico: usa rutas relativas al desplegado (public/icons -> /icons) -->
        <img [src]="isPlaying ? '/icons/pause.svg' : '/icons/play.svg'" alt="" aria-hidden="true"
          class="control-icon" />
        <span class="visually-hidden">{{ isPlaying ? 'Pausa' : 'Reproducir' }}</span>
      </button>

      <label class="volume-control" for="volumeSlider">
        <img [src]="getVolumeIcon()" alt="" aria-hidden="true" class="volume-icon control-icon" />
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" [(ngModel)]="volume"
          (input)="onVolumeInput()" />
      </label>
    </div>
  </div>


</section>
