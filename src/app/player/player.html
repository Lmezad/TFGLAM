
<select id="radioSelect" [(ngModel)]="selectedRadioUrl" (change)="onRadioChange()">
  <option *ngFor="let radio of radios" [value]="radio.url">
    {{ radio.name }}
  </option>
</select>

<button
  type="button"
  class="play-button"
  (click)="togglePlay()"
  [attr.aria-label]="isPlaying ? 'Pause audio' : 'Play audio'"
>
  {{ isPlaying ? 'Pause' : 'Play' }}
</button>

<label class="volume-control" for="volumeSlider">
  <span>Volume</span>
  <input
    id="volumeSlider"
    type="range"
    min="0"
    max="1"
    step="0.01"
    [(ngModel)]="volume"
    (input)="onVolumeInput()"
  />
</label>

<audio #audioPlayer autoplay (play)="onAudioPlay()" (pause)="onAudioPause()">
  Tu navegador no soporta audio HTML5.
</audio>
